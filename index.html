<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Cavaliere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:#e9ddcc;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:24px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
background:rgba(5,5,5,0.6);
backdrop-filter:blur(8px);
}

.logo{
font-family:Georgia, serif;
font-size:28px;
}

nav{
display:flex;
gap:30px;
}

nav a{
font-size:13px;
letter-spacing:.15em;
text-transform:uppercase;
opacity:.85;
}

.cta{
border:1px solid rgba(255,255,255,.2);
padding:12px 22px;
border-radius:30px;
}

/* HERO */

.hero{
min-height:100vh;
display:grid;
grid-template-columns:1.1fr .9fr;
align-items:center;
padding:140px 60px 60px 60px;
position:relative;
}

/* LEFT */

.left{
max-width:600px;
}

.tag{
font-size:12px;
letter-spacing:.2em;
text-transform:uppercase;
margin-bottom:20px;
opacity:.7;
}

h1{
font-family:Georgia, serif;
font-size:90px;
line-height:.9;
margin-bottom:30px;
}

.desc{
font-size:18px;
line-height:1.6;
opacity:.75;
margin-bottom:35px;
}

.buttons{
display:flex;
gap:16px;
}

.btn{
padding:16px 28px;
border-radius:30px;
font-weight:600;
}

.primary{
background:#e9ddcc;
color:#111;
}

.secondary{
border:1px solid rgba(255,255,255,.2);
}

/* RIGHT */

.right{
position:relative;
height:100%;
display:flex;
align-items:flex-end;
justify-content:flex-end;
}

/* BROWN PANEL */

.panel{
position:absolute;
right:0;
top:0;
height:100%;
width:420px;

background:linear-gradient(
135deg,
#3a2a22,
#6b4e3f
);

clip-path:polygon(20% 0,100% 0,100% 100%,0 100%);
}

/* CREATOR WORD */

.creator{
position:absolute;
bottom:40px;
right:40px;
font-size:200px;
color:rgba(255,255,255,.05);
font-family:Impact;
pointer-events:none;
}

/* IMAGE */

.model{
position:absolute;
bottom:0;
right:140px;
width:620px;
filter:drop-shadow(0 30px 60px rgba(0,0,0,.7));
}

/* MOBILE */

@media(max-width:900px){

.hero{
grid-template-columns:1fr;
}

.right{
height:400px;
}

.panel{
width:100%;
clip-path:polygon(0 20%,100% 0,100% 100%,0 100%);
}

.model{
right:50%;
transform:translateX(50%);
width:360px;
}

h1{
font-size:60px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">Sara Cavaliere</div>

<nav>
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">Services</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<a class="cta">Work With Me</a>

</header>

<section class="hero">

<div class="left">

<div class="tag">
FASHION • BEAUTY • LIFESTYLE • UGC
</div>

<h1>
Premium UGC<br>
for brands<br>
that stand out
</h1>

<div class="desc">
Authentic and elegant content designed to elevate brand perception,
build trust and create meaningful engagement.
</div>

<div class="buttons">

<a class="btn primary">
View Portfolio
</a>

<a class="btn secondary">
Book a Collaboration
</a>

</div>

</div>

<div class="right">

<div class="panel"></div>

<div class="creator">
CREATOR
</div>

<img
class="model"
src="/images/sara-hero.jpg"
alt="Sara Cavaliere"
/>

</div>

</section>

</body>
</html>
