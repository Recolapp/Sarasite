<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sara Cavaliere</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#050505;
  --text:#e9ddcc;
  --muted:rgba(233,221,204,.72);
  --line:rgba(255,255,255,.16);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

img{
  display:block;
  max-width:100%;
}

/* GLOBAL CONTAINER */
.container{
  width:min(100%, 1400px);
  margin:0 auto;
  padding:0 38px;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:100;
  background:rgba(5,5,5,.58);
  backdrop-filter:blur(8px);
}

.header-inner{
  height:86px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}

.logo{
  font-family:Georgia, serif;
  font-size:22px;
  font-weight:600;
  letter-spacing:-0.02em;
}

nav{
  display:flex;
  justify-content:center;
  gap:28px;
}

nav a{
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  opacity:.82;
}

.header-cta{
  justify-self:end;
  border:1px solid var(--line);
  padding:12px 22px;
  border-radius:999px;
  font-size:14px;
  transition:.25s ease;
}

.header-cta:hover{
  background:rgba(255,255,255,.04);
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns: 0.95fr 1.05fr;
  align-items:center;
  padding-top:120px;
  padding-bottom:20px;
  position:relative;
}

/* LEFT */
.left{
  position:relative;
  z-index:2;
  max-width:560px;
  padding-top:20px;
}

.tag{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:16px;
  opacity:.62;
}

h1{
  font-family:Georgia, serif;
  font-size:88px;
  line-height:.9;
  letter-spacing:-0.04em;
  margin-bottom:22px;
}

.desc{
  max-width:680px;
  font-size:16px;
  line-height:1.55;
  color:var(--muted);
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:54px;
  padding:0 28px;
  border-radius:999px;
  font-weight:600;
  font-size:15px;
  transition:.25s ease;
}

.primary{
  background:var(--text);
  color:#111;
}

.primary:hover{
  transform:translateY(-1px);
}

.secondary{
  border:1px solid var(--line);
  color:var(--text);
}

.secondary:hover{
  background:rgba(255,255,255,.04);
}

/* RIGHT */
.right{
  position:relative;
  min-height:760px;
  z-index:1;
}

/* PANEL */
.panel{
  position:absolute;
  right:10px;
  top:90px;
  width:min(100%, 380px);
  height:620px;
  background:linear-gradient(180deg, #6f5346 0%, #5d4338 100%);
  clip-path:polygon(18% 0, 100% 0, 100% 100%, 0 100%);
  opacity:.95;
}

/* WORD BACKGROUND */
.creator{
  position:absolute;
  left:40px;
  bottom:120px;
  font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
  font-size:170px;
  line-height:.85;
  letter-spacing:.02em;
  color:rgba(255,255,255,.045);
  pointer-events:none;
  user-select:none;
  z-index:1;
}

/* MODEL */
.model{
  position:absolute;
  right:-25px;
  bottom:0;
  width:620px;
  max-width:none;
  z-index:2;
  filter:drop-shadow(0 26px 50px rgba(0,0,0,.45));
}

/* RESPONSIVE */
@media (max-width: 1200px){
  h1{
    font-size:76px;
  }

  .right{
    min-height:680px;
  }

  .model{
    width:560px;
    right:-10px;
  }

  .creator{
    font-size:140px;
    left:20px;
  }
}

@media (max-width: 980px){
  .header-inner{
    grid-template-columns:1fr auto;
    gap:20px;
  }

  nav{
    display:none;
  }

  .hero{
    grid-template-columns:1fr;
    gap:30px;
    padding-top:120px;
    padding-bottom:40px;
  }

  .left{
    max-width:100%;
  }

  .right{
    min-height:520px;
  }

  .panel{
    right:0;
    left:auto;
    top:40px;
    width:320px;
    height:420px;
  }

  .model{
    width:430px;
    right:0;
  }

  .creator{
    font-size:110px;
    left:10px;
    bottom:70px;
  }

  h1{
    font-size:62px;
  }
}

@media (max-width: 640px){
  .container{
    padding:0 20px;
  }

  .header-inner{
    height:74px;
  }

  .logo{
    font-size:18px;
  }

  .header-cta{
    padding:10px 16px;
    font-size:13px;
  }

  .tag{
    font-size:10px;
    margin-bottom:12px;
  }

  h1{
    font-size:48px;
    line-height:.93;
    margin-bottom:18px;
  }

  .desc{
    font-size:15px;
    margin-bottom:24px;
  }

  .buttons{
    gap:12px;
  }

  .btn{
    width:100%;
    min-height:50px;
  }

  .right{
    min-height:430px;
  }

  .panel{
    width:78%;
    height:340px;
    top:35px;
  }

  .model{
    width:340px;
    right:-10px;
  }

  .creator{
    font-size:72px;
    bottom:58px;
    left:0;
  }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">Sara Cavaliere</div>

      <nav>
        <a href="#">Home</a>
        <a href="#">Portfolio</a>
        <a href="#">Services</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>

      <a href="#" class="header-cta">Work With Me</a>
    </div>
  </div>
</header>

<section class="hero container">
  <div class="left">
    <div class="tag">FASHION • BEAUTY • LIFESTYLE • UGC</div>

    <h1>
      Premium UGC<br>
      for brands<br>
      that stand out
    </h1>

    <div class="desc">
      Authentic and elegant content designed to elevate brand perception,
      build trust and create meaningful engagement.
    </div>

    <div class="buttons">
      <a href="#" class="btn primary">View Portfolio</a>
      <a href="#" class="btn secondary">Book a Collaboration</a>
    </div>
  </div>

  <div class="right">
    <div class="panel"></div>
    <div class="creator">CREATOR</div>

    <img
      class="model"
      src="/images/sara-hero.png"
      alt="Sara Cavaliere"
    />
  </div>
</section>

</body>
</html>
