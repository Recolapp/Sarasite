<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sara Cavaliere</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#050505;
      --text:#e9ddcc;
      --muted:rgba(233,221,204,.76);
      --line:rgba(255,255,255,.16);
      --panel-a:#7b5c4f;
      --panel-b:#66483d;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial, sans-serif;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      display:block;
    }

    .container{
      width:min(1440px, 100%);
      margin:0 auto;
      padding:0 56px;
    }

    /* HEADER */

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:100;
      background:rgba(5,5,5,.18);
      backdrop-filter:blur(6px);
    }

    .header-inner{
      height:92px;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
    }

    .logo{
      font-family:Georgia, serif;
      font-size:24px;
      font-weight:600;
      letter-spacing:-0.02em;
    }

    nav{
      display:flex;
      justify-content:center;
      gap:34px;
    }

    nav a{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      opacity:.86;
    }

    .header-cta{
      justify-self:end;
      border:1px solid var(--line);
      padding:14px 24px;
      border-radius:999px;
      font-size:14px;
    }

    /* HERO */

    .hero{
      position:relative;
      min-height:100vh;
      padding-top:112px;
      overflow:hidden;
    }

    .hero-inner{
      position:relative;
      min-height:calc(100vh - 112px);
      display:grid;
      grid-template-columns:620px 1fr;
      align-items:center;
    }

    /* LEFT */

    .left{
      position:relative;
      z-index:3;
      max-width:620px;
      padding-top:10px;
      padding-bottom:40px;
    }

    .tag{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      opacity:.62;
      margin-bottom:18px;
    }

    h1{
      font-family:Georgia, serif;
      font-size:104px;
      line-height:.87;
      letter-spacing:-.055em;
      margin-bottom:28px;
    }

    .desc{
      max-width:620px;
      font-size:18px;
      line-height:1.5;
      color:var(--muted);
      margin-bottom:34px;
    }

    .buttons{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 30px;
      border-radius:999px;
      font-size:15px;
      font-weight:600;
    }

    .primary{
      background:var(--text);
      color:#111;
    }

    .secondary{
      border:1px solid var(--line);
    }

    /* RIGHT VISUAL */

    .visual{
      position:absolute;
      right:0;
      top:112px;
      width:min(47vw, 760px);
      height:calc(100vh - 112px);
      pointer-events:none;
    }

    .panel{
      position:absolute;
      right:0;
      top:105px;
      width:min(22vw, 360px);
      height:620px;
      background:linear-gradient(180deg, var(--panel-a), var(--panel-b));
      clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);
      z-index:1;
    }

    .creator{
      position:absolute;
      left:-235px;
      bottom:72px;
      font-family:Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size:220px;
      line-height:.85;
      color:rgba(255,255,255,.045);
      z-index:0;
      user-select:none;
      pointer-events:none;
    }

    .model{
      position:absolute;
      right:34px;
      bottom:0;
      height:min(88vh, 840px);
      width:auto;
      z-index:2;
      filter:drop-shadow(0 28px 50px rgba(0,0,0,.34));
    }

    /* RESPONSIVE */

    @media (max-width: 1280px){
      .container{
        padding:0 40px;
      }

      .hero-inner{
        grid-template-columns:560px 1fr;
      }

      h1{
        font-size:90px;
      }

      .visual{
        width:min(46vw, 660px);
      }

      .panel{
        width:min(24vw, 320px);
        height:560px;
        top:110px;
      }

      .creator{
        font-size:175px;
        left:-170px;
      }

      .model{
        height:min(82vh, 730px);
        right:18px;
      }
    }

    @media (max-width: 980px){
      .header-inner{
        grid-template-columns:1fr auto;
      }

      nav{
        display:none;
      }

      .container{
        padding:0 22px;
      }

      .hero{
        padding-top:98px;
      }

      .hero-inner{
        min-height:auto;
        display:block;
      }

      .left{
        max-width:100%;
        padding-top:12px;
        padding-bottom:18px;
      }

      h1{
        font-size:62px;
      }

      .desc{
        font-size:16px;
        max-width:100%;
      }

      .visual{
        position:relative;
        top:auto;
        right:auto;
        width:100%;
        height:500px;
        margin-top:10px;
      }

      .panel{
        right:0;
        top:35px;
        width:300px;
        height:410px;
      }

      .creator{
        left:0;
        bottom:34px;
        font-size:120px;
      }

      .model{
        right:10px;
        bottom:0;
        height:430px;
      }
    }

    @media (max-width: 640px){
      .logo{
        font-size:19px;
      }

      .header-cta{
        padding:10px 16px;
        font-size:13px;
      }

      .tag{
        font-size:10px;
      }

      h1{
        font-size:48px;
        line-height:.9;
      }

      .buttons{
        gap:12px;
      }

      .btn{
        width:100%;
      }

      .visual{
        height:420px;
      }

      .panel{
        width:245px;
        height:340px;
      }

      .creator{
        font-size:88px;
      }

      .model{
        height:335px;
        right:0;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-inner">
        <div class="logo">Sara Cavaliere</div>

        <nav>
          <a href="#">Home</a>
          <a href="#">Portfolio</a>
          <a href="#">Services</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </nav>

        <a href="#" class="header-cta">Work With Me</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-inner">
        <div class="left">
          <div class="tag">FASHION • BEAUTY • LIFESTYLE • UGC</div>

          <h1>
            Premium UGC<br>
            for brands<br>
            that stand out
          </h1>

          <div class="desc">
            Authentic and elegant content designed to elevate brand perception,
            build trust and create meaningful engagement.
          </div>

          <div class="buttons">
            <a href="#" class="btn primary">View Portfolio</a>
            <a href="#" class="btn secondary">Book a Collaboration</a>
          </div>
        </div>
      </div>
    </div>

    <div class="visual">
      <div class="panel"></div>
      <div class="creator">CREATOR</div>
      <img class="model" src="/images/sara-hero.jpg" alt="Sara Cavaliere">
    </div>
  </section>

</body>
</html>
