<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Arial, sans-serif;
overflow:hidden;
}

.hero{
position:relative;
height:100vh;
width:100%;
display:flex;
align-items:center;
color:#e8dbc9;
overflow:hidden;
}

/* warm panel */

.panel{
position:absolute;
right:-10%;
top:0;
height:120%;
width:45%;
background:linear-gradient(140deg,#2c1f19,#6b4e3f,#3a2a22);
clip-path:polygon(25% 0,100% 0,100% 100%,0 100%);
opacity:.9;
}

/* container */

.container{
width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
position:relative;
z-index:2;
}

/* TEXT */

.text{
max-width:520px;
}

.eyebrow{
letter-spacing:.25em;
font-size:12px;
opacity:.8;
margin-bottom:24px;
transform:translateY(20px);
opacity:0;
animation:fadeUp .8s ease forwards;
}

h1{
font-family:Georgia,serif;
font-size:76px;
line-height:.92;
letter-spacing:-.04em;
margin-bottom:20px;
transform:translateY(30px);
opacity:0;
animation:fadeUp 1s ease .2s forwards;
}

.desc{
font-size:18px;
line-height:1.6;
color:rgba(232,219,201,.75);
margin-bottom:30px;
transform:translateY(30px);
opacity:0;
animation:fadeUp 1s ease .35s forwards;
}

/* BUTTONS */

.buttons{
display:flex;
gap:14px;
transform:translateY(30px);
opacity:0;
animation:fadeUp 1s ease .5s forwards;
}

.btn{
padding:16px 28px;
border-radius:40px;
font-weight:600;
font-size:15px;
transition:all .25s ease;
cursor:pointer;
}

.btn-primary{
background:#e8dbc9;
color:#111;
}

.btn-primary:hover{
transform:translateY(-2px);
}

.btn-secondary{
border:1px solid rgba(232,219,201,.3);
}

.btn-secondary:hover{
background:rgba(255,255,255,.05);
}

/* VISUAL */

.visual{
position:relative;
height:700px;
display:flex;
align-items:flex-end;
justify-content:center;
}

/* background word */

.word{
position:absolute;
font-family:Impact;
font-size:220px;
bottom:120px;
left:50%;
transform:translateX(-30%);
color:rgba(232,219,201,.15);
white-space:nowrap;
pointer-events:none;
}

/* image */

.model{
position:relative;
max-width:580px;
z-index:2;
transform:translateY(40px);
opacity:0;
animation:fadeUp 1s ease .4s forwards;
filter:drop-shadow(0 25px 40px rgba(0,0,0,.4));
}

/* badge */

.badge{
position:absolute;
right:40px;
top:60px;
font-family:Georgia,serif;
font-size:40px;
}

/* animations */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<section class="hero">

<div class="panel"></div>

<div class="container">

<div class="text">

<div class="eyebrow">
FASHION • BEAUTY • LIFESTYLE • UGC
</div>

<h1>
Premium UGC<br>
for brands<br>
that stand out
</h1>

<p class="desc">
Authentic and elegant content designed to elevate
brand perception and create meaningful engagement.
</p>

<div class="buttons">
<div class="btn btn-primary">View Portfolio</div>
<div class="btn btn-secondary">Book a Collaboration</div>
</div>

</div>

<div class="visual">

<div class="badge">UGC</div>

<div class="word">CREATOR</div>

<img class="model"
src="<img src="./images/sara-hero.png" alt="Sara Cavaliere">">

</div>

</div>

</section>

<script>

/* PARALLAX PREMIUM */

const image = document.querySelector(".model")
const word = document.querySelector(".word")

window.addEventListener("scroll",()=>{

let scroll = window.scrollY

image.style.transform = "translateY(" + scroll * -.15 + "px)"

word.style.transform =
"translateX(-30%) translateY(" + scroll * -.05 + "px)"

})

</script>

</body>

</html>
