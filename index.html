<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sara Cavaliere</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#050505;
      --text:#e9ddcc;
      --muted:rgba(233,221,204,.76);
      --line:rgba(255,255,255,.16);
      --panel-1:#7a5b4d;
      --panel-2:#66493e;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial, sans-serif;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      display:block;
      max-width:100%;
    }

    .container{
      width:min(1440px, 100%);
      margin:0 auto;
      padding:0 56px;
    }

    /* HEADER */

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:100;
      background:rgba(5,5,5,.18);
      backdrop-filter:blur(6px);
    }

    .header-inner{
      height:92px;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
    }

    .logo{
      font-family:Georgia, serif;
      font-size:24px;
      font-weight:600;
      letter-spacing:-0.02em;
    }

    nav{
      display:flex;
      justify-content:center;
      gap:34px;
    }

    nav a{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      opacity:.86;
    }

    .header-cta{
      justify-self:end;
      border:1px solid var(--line);
      padding:14px 24px;
      border-radius:999px;
      font-size:14px;
    }

    /* HERO */

    .hero{
      position:relative;
      min-height:100vh;
      padding-top:118px;
      overflow:hidden;
    }

    .hero-grid{
      display:grid;
      grid-template-columns: 0.95fr 1.05fr;
      align-items:end;
      min-height:calc(100vh - 118px);
      position:relative;
    }

    /* LEFT */

    .left{
      position:relative;
      z-index:3;
      max-width:620px;
      padding-bottom:58px;
    }

    .tag{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      opacity:.62;
      margin-bottom:18px;
    }

    h1{
      font-family:Georgia, serif;
      font-size:102px;
      line-height:.88;
      letter-spacing:-.05em;
      margin-bottom:28px;
    }

    .desc{
      font-size:18px;
      line-height:1.5;
      color:var(--muted);
      max-width:620px;
      margin-bottom:34px;
    }

    .buttons{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 30px;
      border-radius:999px;
      font-size:15px;
      font-weight:600;
    }

    .primary{
      background:var(--text);
      color:#111;
    }

    .secondary{
      border:1px solid var(--line);
    }

    /* RIGHT */

    .right{
      position:relative;
      min-height:760px;
    }

    .panel{
      position:absolute;
      right:0;
      top:60px;
      width:360px;
      height:610px;
      background:linear-gradient(180deg, var(--panel-1), var(--panel-2));
      clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);
      z-index:1;
    }

    .creator{
      position:absolute;
      left:-10px;
      bottom:70px;
      font-family:Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size:210px;
      line-height:.85;
      color:rgba(255,255,255,.045);
      z-index:0;
      pointer-events:none;
      user-select:none;
    }

    .model{
      position:absolute;
      right:55px;
      bottom:0;
      width:760px;
      max-width:none;
      z-index:2;
      filter:drop-shadow(0 30px 55px rgba(0,0,0,.36));
    }

    /* RESPONSIVE */

    @media (max-width: 1280px){
      .container{
        padding:0 40px;
      }

      h1{
        font-size:88px;
      }

      .right{
        min-height:690px;
      }

      .panel{
        width:320px;
        height:560px;
        top:70px;
      }

      .creator{
        font-size:170px;
        bottom:78px;
      }

      .model{
        width:660px;
        right:25px;
      }
    }

    @media (max-width: 980px){
      .header-inner{
        grid-template-columns:1fr auto;
      }

      nav{
        display:none;
      }

      .container{
        padding:0 22px;
      }

      .hero{
        padding-top:98px;
      }

      .hero-grid{
        grid-template-columns:1fr;
        min-height:auto;
      }

      .left{
        max-width:100%;
        padding-bottom:20px;
      }

      h1{
        font-size:60px;
      }

      .desc{
        font-size:16px;
      }

      .right{
        min-height:500px;
      }

      .panel{
        top:30px;
        width:290px;
        height:410px;
      }

      .creator{
        font-size:120px;
        left:0;
        bottom:35px;
      }

      .model{
        width:430px;
        right:10px;
        bottom:0;
      }
    }

    @media (max-width: 640px){
      .logo{
        font-size:19px;
      }

      .header-cta{
        padding:10px 16px;
        font-size:13px;
      }

      .tag{
        font-size:10px;
      }

      h1{
        font-size:48px;
        line-height:.9;
      }

      .buttons{
        gap:12px;
      }

      .btn{
        width:100%;
      }

      .right{
        min-height:420px;
      }

      .panel{
        width:240px;
        height:330px;
      }

      .creator{
        font-size:88px;
      }

      .model{
        width:330px;
        right:0;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-inner">
        <div class="logo">Sara Cavaliere</div>

        <nav>
          <a href="#">Home</a>
          <a href="#">Portfolio</a>
          <a href="#">Services</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </nav>

        <a href="#" class="header-cta">Work With Me</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-grid">

        <div class="left">
          <div class="tag">FASHION • BEAUTY • LIFESTYLE • UGC</div>

          <h1>
            Premium UGC<br>
            for brands<br>
            that stand out
          </h1>

          <div class="desc">
            Authentic and elegant content designed to elevate brand perception,
            build trust and create meaningful engagement.
          </div>

          <div class="buttons">
            <a href="#" class="btn primary">View Portfolio</a>
            <a href="#" class="btn secondary">Book a Collaboration</a>
          </div>
        </div>

        <div class="right">
          <div class="panel"></div>
          <div class="creator">CREATOR</div>
          <img class="model" src="/images/sara-hero.jpg" alt="Sara Cavaliere" />
        </div>

      </div>
    </div>
  </section>

</body>
</html>
