<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sara Cavaliere</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    :root{
      --bg:#050505;
      --cream:#e9ddcc;
      --cream-soft:rgba(233,221,204,.76);
      --line:rgba(233,221,204,.16);
      --panel-1:#35241d;
      --panel-2:#6d4c3c;
      --panel-3:#4f372d;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:var(--bg);
      color:var(--cream);
      font-family:'Inter', sans-serif;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .site-header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      padding:24px 0;
      background:transparent;
      border-bottom:1px solid transparent;
      transition:
        background-color .35s ease,
        backdrop-filter .35s ease,
        -webkit-backdrop-filter .35s ease,
        border-color .35s ease,
        padding .35s ease,
        box-shadow .35s ease;
    }

    .site-header.scrolled{
      background:rgba(10,10,10,.56);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(233,221,204,.08);
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      padding:14px 0;
    }

    .nav-wrap{
      width:min(1280px, calc(100% - 64px));
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .logo{
      font-family:'Cormorant Garamond', serif;
      font-size:28px;
      font-weight:600;
      line-height:1;
      color:var(--cream);
      white-space:nowrap;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:34px;
    }

    .nav a{
      font-size:13px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(233,221,204,.86);
      transition:opacity .25s ease;
    }

    .nav a:hover{
      opacity:.7;
    }

    .nav-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:0 22px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--cream);
      font-size:14px;
      font-weight:600;
      white-space:nowrap;
      transition:transform .25s ease, background-color .25s ease, border-color .25s ease;
    }

    .nav-cta:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.05);
      border-color:rgba(233,221,204,.28);
    }

    .hero{
      position:relative;
      min-height:100vh;
      padding:130px 0 36px;
      overflow:hidden;
      background:
        radial-gradient(circle at 12% 22%, rgba(233,221,204,.04), transparent 22%),
        linear-gradient(180deg, #040404 0%, #080808 100%);
    }
