<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Cavaliere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:#e9ddcc;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

img{
display:block;
max-width:100%;
}

/* CONTAINER */

.container{
width:min(1480px,100%);
margin:auto;
padding:0 60px;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(5,5,5,.35);
backdrop-filter:blur(6px);
z-index:100;
}

.header-inner{
height:90px;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
}

.logo{
font-family:Georgia, serif;
font-size:24px;
font-weight:600;
}

nav{
display:flex;
gap:34px;
justify-content:center;
}

nav a{
font-size:12px;
letter-spacing:.18em;
text-transform:uppercase;
opacity:.85;
}

.header-cta{
justify-self:end;
border:1px solid rgba(255,255,255,.18);
padding:14px 26px;
border-radius:999px;
font-size:14px;
}

/* HERO */

.hero{
min-height:100vh;
display:grid;
grid-template-columns:.9fr 1.1fr;
align-items:start;
padding-top:120px;
position:relative;
}

/* LEFT */

.left{
max-width:640px;
padding-top:40px;
z-index:3;
}

.tag{
font-size:12px;
letter-spacing:.22em;
text-transform:uppercase;
margin-bottom:18px;
opacity:.65;
}

h1{
font-family:Georgia, serif;
font-size:104px;
line-height:.88;
letter-spacing:-0.05em;
margin-bottom:30px;
}

.desc{
font-size:18px;
line-height:1.5;
opacity:.75;
margin-bottom:36px;
max-width:640px;
}

.buttons{
display:flex;
gap:16px;
flex-wrap:wrap;
}

.btn{
padding:18px 32px;
border-radius:999px;
font-weight:600;
font-size:15px;
}

.primary{
background:#e9ddcc;
color:#111;
}

.secondary{
border:1px solid rgba(255,255,255,.18);
}

/* RIGHT */

.right{
position:relative;
min-height:850px;
}

/* PANEL */

.panel{
position:absolute;
right:60px;
top:80px;
width:360px;
height:620px;
background:linear-gradient(
180deg,
#7a5b4d,
#66493e
);
clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);
z-index:1;
}

/* BACKGROUND WORD */

.creator{
position:absolute;
left:0;
bottom:120px;
font-family:Impact;
font-size:220px;
color:rgba(255,255,255,.045);
pointer-events:none;
z-index:0;
}

/* MODEL */

.model{
position:absolute;
right:-60px;
bottom:0;
width:780px;
max-width:none;
z-index:2;
filter:drop-shadow(0 35px 60px rgba(0,0,0,.4));
}

/* RESPONSIVE */

@media(max-width:1200px){

h1{
font-size:86px;
}

.model{
width:640px;
right:-20px;
}

.panel{
width:320px;
height:560px;
}

.creator{
font-size:180px;
}

}

@media(max-width:900px){

nav{
display:none;
}

.hero{
grid-template-columns:1fr;
}

h1{
font-size:62px;
}

.right{
min-height:520px;
margin-top:20px;
}

.model{
width:420px;
right:0;
}

.panel{
width:300px;
height:420px;
right:0;
}

.creator{
font-size:120px;
bottom:80px;
}

}

</style>

</head>

<body>

<header>
<div class="container header-inner">

<div class="logo">Sara Cavaliere</div>

<nav>
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">Services</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<a class="header-cta">Work With Me</a>

</div>
</header>

<section class="hero container">

<div class="left">

<div class="tag">
FASHION • BEAUTY • LIFESTYLE • UGC
</div>

<h1>
Premium UGC<br>
for brands<br>
that stand out
</h1>

<div class="desc">
Authentic and elegant content designed to elevate brand perception,
build trust and create meaningful engagement.
</div>

<div class="buttons">

<a class="btn primary">
View Portfolio
</a>

<a class="btn secondary">
Book a Collaboration
</a>

</div>

</div>

<div class="right">

<div class="panel"></div>

<div class="creator">
CREATOR
</div>

<img
class="model"
src="/images/sara-hero.jpg"
alt="Sara Cavaliere"
/>

</div>

</section>

</body>
</html>
